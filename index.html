{ question: "Because LLM-powered agents can suffer from hallucinations, what is a recommended mitigation strategy when using them in test processes?", options: ["Allowing them full unrestricted access to production databases", "Only using them for tasks that have zero risk", "Implementing automated verification procedures for the agent's results or using semi-autonomous agents for critical tasks", "Disabling their ability to communicate with other agents"], answer: 2, explanation: "Because agents can make reasoning errors or hallucinate, risks must be carefully mitigated by implementing automated verification procedures or using semi-autonomous agents with strict human oversight for critical tasks.", syllabusMapping: "GenAI-4.1.3 (K2) Explain the role and application of LLM-powered agents in automating test processes" },
{ question: "What is a major challenge of fine-tuning GenAI models related to 'opacity'?", options: ["The model becomes too large to store on a standard hard drive", "The lack of transparency in how the model makes decisions complicates debugging and validation", "The model automatically deletes its previous training data", "The model can only be accessed via a command-line interface"], answer: 1, explanation: "Opacity refers to the 'black box' lack of transparency in how an LLM makes its decisions or produces its outputs, which severely complicates debugging and validation after fine-tuning.", syllabusMapping: "GenAI-4.2.1 (K2) Explain the fine-tuning of language models for specific test tasks" },
{ question: "When an organization chooses to develop an in-house LLM-powered test tool, what is a primary advantage despite the high operational costs?", options: ["It requires absolutely no technical expertise to implement", "It completely eliminates the need for prompt engineering", "It offers comprehensive control over data privacy and security risks", "It guarantees that the model will never hallucinate"], answer: 2, explanation: "Developing an in-house LLM-powered test tool offers the organization comprehensive, full-stack control over data privacy and security risks, ensuring no sensitive data ever leaves the internal network.", syllabusMapping: "GenAI-4.2.2 (K2) Explain LLMOps and its role in deploying and managing LLMs for test tasks" },
{ question: "To ensure compliance with ethical guidelines, what should organizations establish regarding the use of GenAI?", options: ["Rules that forbid the use of any AI tools", "Mandates that AI must execute all tests in production", "Policies that allow unrestricted use of public LLMs for sensitive data", "Process guidelines, transparency obligations, and quality gates with reviews of generated testware"], answer: 3, explanation: "To ensure compliance with regulatory standards and ethical guidelines, organizations must establish strict process guidelines, transparency obligations, and mandatory quality gates for human review.", syllabusMapping: "GenAI-3.4.1 (K1) Recall examples of AI regulations, standards, and best practice frameworks relevant to Generative AI in software testing" },
{ question: "When selecting an LLM for software testing, why is 'community and support' an important criterion?", options: ["Active community support and detailed documentation aid in implementation and troubleshooting", "A larger community guarantees the LLM will have lower recurring costs", "Community support eliminates the need for internal test managers", "Models with community support do not require fine-tuning"], answer: 0, explanation: "Community and support is an important selection criterion because active community forums, regular updates, and detailed documentation greatly aid internal teams in troubleshooting complex implementation issues.", syllabusMapping: "GenAI-5.1.3 (K2) Summarize key criteria for selecting LLMs/SLMs for software test tasks in a given context" },
{ question: "In which phase of GenAI adoption does an organization focus on continuous monitoring, measurement, and managing the transformation for scalable benefits?", options: ["Discovery", "Utilization and iteration", "Initiation and usage definition", "Experimentation and refinement"], answer: 1, explanation: "The 'Utilization and iteration' phase is when organizations fully integrate GenAI into test processes, continuously monitor its progress, and manage the transformation to ensure long-term sustainable and scalable benefits.", syllabusMapping: "GenAI-5.1.4 (K1) Recall key phases in the adoption of Generative AI in a test organization" },
{ question: "What essential skill must testers develop to protect data security when sharing testware with LLMs?", options: ["Prompt chaining to hide the data inside multiple requests", "Increasing the temperature parameter to scramble the data", "Data sanitization, which involves removing or masking sensitive, personal, or confidential information", "Using classical machine learning instead of GenAI"], answer: 2, explanation: "Data sanitization involves rigorously removing or masking sensitive, personal, or confidential information before sharing data with external models to preserve strict data privacy.", syllabusMapping: "GenAI-5.2.1 (K2) Explain the essential skills and knowledge areas required for testers to work effectively with generative AI in test processes" },
{ question: "What is a 'prompt pattern' in the context of building GenAI capabilities within a test team?", options: ["A specific type of neural network architecture", "A metric used to evaluate the execution success rate of a test", "A regulatory framework for AI compliance", "A reusable template for crafting effective prompts to guide GenAI toward consistent outputs"], answer: 3, explanation: "A prompt pattern is a reusable structural blueprint for crafting effective prompts. Sharing these blueprints across the organization helps ensure consistent and high-quality LLM outputs.", syllabusMapping: "GenAI-5.2.2 (K1) Recall strategies for cultivating AI skills within test teams to support the adoption of Generative AI in test activities" },
{ question: "How do internal communities of practice support ongoing GenAI knowledge sharing in a test team?", options: ["By holding regular meetings to highlight successful applications, discuss challenges, and share prompt libraries", "By outsourcing all GenAI training to external vendors", "By enforcing strict penalties for testers who experience AI hallucinations", "By isolating testers so they can develop unique, unshared prompt strategies"], answer: 0, explanation: "An essential learning method in internal communities of practice is holding regular meetings to collaboratively discuss challenges, their resolutions, and to openly share successful prompt libraries.", syllabusMapping: "GenAI-5.2.2 (K1) Recall strategies for cultivating AI skills within test teams to support the adoption of Generative AI in test activities" },
{ question: "How does the role of a traditional tester evolve in an AI-enabled test organization?", options: ["Testers become purely focused on manual exploratory testing", "Testers become AI-assisted test specialists, focusing on prompt refinement, output review, and maintaining prompt libraries", "Testers stop writing test cases entirely and focus only on coding", "Testers take over the responsibilities of the Chief Information Security Officer (CISO)"], answer: 1, explanation: "Testers evolve into AI-assisted testing specialists. Their daily tasks expand from manually designing test cases to actively guiding the AI through prompts and rigorously verifying the AI-generated testware.", syllabusMapping: "GenAI-5.2.3 (K1) Recognize how test processes and responsibilities shift within a test organization when adopting Generative AI for testing" },
{ question: "In an AI-enabled test organization, what new management skill is required of test managers?", options: ["Writing the source code for the organization's fine-tuned LLM", "Performing all manual data sanitization tasks", "Coordinating and overseeing hybrid teams consisting of both human testers and GenAI-powered test agents", "Managing the physical hardware servers that host the vector databases"], answer: 2, explanation: "It is the responsibility of the test manager to coordinate and oversee hybrid teams, establish AI governance, and ensure the team maintains a strong balance of both traditional testing competencies and AI literacy.", syllabusMapping: "GenAI-5.2.3 (K1) Recognize how test processes and responsibilities shift within a test organization when adopting Generative AI for testing" },
{ question: "How can an LLM support the generation of test oracles?", options: ["By autonomously executing all exploratory tests", "By compiling the application's source code to find syntax errors", "By manually rewriting the requirements documents", "By synthesizing requirements to generate expected results, creating a baseline to compare against actual software outputs"], answer: 3, explanation: "LLMs can solve the test oracle problem by synthesizing requirements to generate expected results, creating a baseline to compare against actual software outputs.", syllabusMapping: "GenAI-1.2.1 (K2) Give examples of key LLM capabilities for test tasks" },
{ question: "What does the 'Recall' metric measure when evaluating LLM outputs for testing?", options: ["The ability of a model to identify all relevant instances within a dataset, ensuring that critical edge cases or valid partitions are not omitted", "The amount of time the LLM takes to generate a complete test suite", "The grammatical correctness of the generated Gherkin test cases", "The degree to which the generated test cases are factually incorrect or irrelevant"], answer: 0, explanation: "Recall specifically measures the ability of a model to identify all relevant instances within a dataset, ensuring that generated test suites do not omit critical edge cases or valid partitions.", syllabusMapping: "GenAI-2.3.1 (K2) Understand the metrics for evaluating the results of Generative AI on test tasks" },
{ question: "Which hallucination detection approach involves comparing AI-generated output with existing documentation and known system behavior?", options: ["Output testing", "Cross-verification", "Temperature adjustment", "RAG"], answer: 1, explanation: "Cross-verification is a detection approach that involves directly comparing AI-generated output with existing documentation, requirements, and known system behavior to spot hallucinations.", syllabusMapping: "GenAI-3.1.3 (K2) Summarize mitigation techniques for GenAI hallucinations, reasoning errors and biases" },
{ question: "In an LLM-powered test infrastructure, what is the role of the 'post-processing component'?", options: ["It tokenizes the initial user prompt", "It stores the high-dimensional embeddings", "It refines the LLM's raw output to ensure it aligns with the test conditions before presenting it to the front-end", "It acts as the conversational chatbot interface"], answer: 2, explanation: "The post-processing component of the back-end enhances and filters the LLM’s raw output, ensuring its responses align with the expected formats and test conditions before being presented to the user.", syllabusMapping: "GenAI-4.1.1 (K2) Explain key architectural components and concepts of LLM-powered test infrastructure" },
{ question: "What activities are typical during the 'Discovery' phase of GenAI adoption?", options: ["Fully integrating GenAI into the CI/CD pipeline", "Establishing a permanent LLMOps framework", "Conducting organization-wide security audits on mature AI tools", "Training test teams on GenAI concepts, providing access to models, and experimenting with initial use cases"], answer: 3, explanation: "The Discovery phase focuses heavily on early awareness and capability building, which includes training test teams, providing access to LLMs/SLMs, and experimenting with safe initial use cases.", syllabusMapping: "GenAI-5.1.4 (K1) Recall key phases in the adoption of Generative AI in a test organization" },
{ question: "How are images processed by multimodal LLMs before being fed into the transformer model?", options: ["They are converted into natural language text by a classic machine learning algorithm", "They are converted into high-dimensional embeddings using vision-language models", "They are discarded because transformers only process textual tokens", "They are translated directly into source code representing the pixel grid"], answer: 1, explanation: "To handle various modalities, tokenization is adapted for each data type; for example, images are converted into embeddings using vision-language models before being processed in the transformer model.", syllabusMapping: "GenAI-1.1.4 (K2) Summarize the basic principles of multimodal LLMs and vision-language models" },
{ question: "Which type of Large Language Model specifically emphasizes capabilities such as chain-of-thought reasoning and multi-step problem-solving?", options: ["Instruction-tuned LLMs", "Small Language Models (SLMs)", "Reasoning LLMs", "Foundation LLMs"], answer: 2, explanation: "Reasoning models extend instruction-tuned models by emphasizing structured cognitive abilities such as logical inference, multi-step problem-solving, and chain-of-thought reasoning.", syllabusMapping: "GenAI-1.1.3 (K2) Distinguish between foundation, instruction-tuned and reasoning LLMs" },
{ question: "What is a key limitation of the transformer model architecture when predicting the next token during text generation?", options: ["It can only process structured numerical data and cannot process natural language", "It generates new text that is statistically plausible based on training data, but plausible is not necessarily correct", "It requires rule-based symbolic logic to generate any response", "It completely eliminates the risk of non-deterministic behavior"], answer: 1, explanation: "The transformer model can be used to generate new text that is statistically plausible, based on training data and the prompt, but plausible is not necessarily correct.", syllabusMapping: "GenAI-1.1.2 (K2) Explain the basics of generative AI and large language models" },
{ question: "Which statement best describes the difference between Deep Learning and Generative AI?", options: ["Deep learning requires manual feature selection, whereas Generative AI uses symbolic logic", "Generative AI is a subset of classical machine learning, while Deep Learning uses rule-based systems", "Generative AI uses deep learning techniques to create new content by learning and mimicking patterns from its training data", "There is no difference; the terms are interchangeable in software testing"], answer: 2, explanation: "Generative AI uses deep learning techniques to create new content (text, images, code) by learning and mimicking patterns from its training data.", syllabusMapping: "GenAI-1.1.1 (K1) Recall different types of AI: symbolic AI, classical machine learning, deep learning, and generative AI" },
{ question: "Which type of AI relies on extracting knowledge using symbols and logical rules to mimic human decision-making?", options: ["Deep Learning", "Classical Machine Learning", "Symbolic AI", "Generative AI"], answer: 2, explanation: "Symbolic AI uses a rule-based system to mimic human decision-making, representing knowledge using symbols and logical rules.", syllabusMapping: "GenAI-1.1.1 (K1) Recall different types of AI: symbolic AI, classical machine learning, deep learning, and generative AI" },
{ question: "What is a key characteristic of Foundation LLMs?", options: ["They are primarily designed to generate Gherkin-syntax scripts with perfect precision", "They are general-purpose models pre-trained on vast datasets, enabling them to support various tasks but typically requiring further adaptation", "They only process image data and cannot understand text", "They lack non-deterministic behavior entirely"], answer: 1, explanation: "Foundation LLMs are general-purpose models trained on vast and diverse datasets. While powerful and flexible, foundation models typically require further adaptation or instruction-tuning to effectively meet specific task requirements.", syllabusMapping: "GenAI-1.1.3 (K2) Distinguish between foundation, instruction-tuned and reasoning LLMs" },
{ question: "When designing a system prompt for an LLM-powered test tool, which of the following elements may it contain?", options: ["Only the user's immediate question", "Parts of a structured prompt such as the role, context, and constraints", "Real-time execution logs from a CI/CD pipeline", "A dynamically changing temperature setting"], answer: 1, explanation: "The system prompt sets the fundamental rules for the entire conversation and may contain several parts of a structured prompt, such as establishing the baseline role, context, and constraints that remain constant.", syllabusMapping: "GenAI-2.1.3 (K2) Distinguish between system prompts and user prompts" },
{ question: "Which prompting technique reflects a form of 'pairing' with the GenAI tool, where the tester and AI interactively co-create an effective prompt?", options: ["Zero-shot prompting", "Meta prompting", "Prompt chaining", "Few-shot prompting"], answer: 1, explanation: "Meta prompting leverages the AI's ability to generate or refine its own prompts iteratively. The tester provides initial ideas, and the AI suggests improvements or asks clarifying questions, acting as a collaborative partner.", syllabusMapping: "GenAI-2.1.2 (K2) Differentiate core prompting techniques for software testing" },
{ question: "During test analysis, how can an LLM best prioritize test conditions?", options: ["By executing the test conditions against the application source code", "By translating the test conditions into Gherkin syntax", "By considering aspects such as regulatory compliance, user-facing features, and historical defect data", "By randomly assigning risk levels using a high temperature setting"], answer: 2, explanation: "LLMs can prioritize test conditions based on risk level by analyzing and cross-referencing aspects such as regulatory compliance requirements, criticality of user-facing features, and historical defect data.", syllabusMapping: "GenAI-2.2.1 (K3) Apply generative AI to test analysis tasks" },
{ question: "What is a primary benefit of using GenAI for test data synthesis instead of using raw production data?", options: ["It automatically translates the data into multiple languages", "It guarantees zero defects in the final product", "It creates representative synthetic data that preserves data privacy while covering extreme situations", "It completely replaces the need for boundary value analysis"], answer: 2, explanation: "GenAI can create highly representative synthetic test data that strongly resembles production data, allowing testers to simulate realistic scenarios and cover extreme edge cases while preserving data privacy by avoiding the exposure of actual sensitive user information.", syllabusMapping: "GenAI-1.2.1 (K2) Give examples of key LLM capabilities for test tasks" },
{ question: "Which of the following is a specific challenge that GenAI can help overcome when maintaining API-based automated regression tests?", options: ["Adapting dynamic locators on graphical user interfaces", "Adapting test scripts to evolving API specifications, such as changing endpoints and request/response formats", "Generating physical test environments for hardware compatibility testing", "Manually writing test charters for exploratory testing"], answer: 1, explanation: "While GUI tests struggle with dynamic locators, API tests face challenges with changing request/response formats, endpoints, and authentication. GenAI can analyze these evolving API specifications and automatically adapt the test scripts (self-healing).", syllabusMapping: "GenAI-2.2.3 (K3) Apply generative AI to automated regression testing" },
{ question: "How can GenAI assist a test manager in the continuous learning aspect of test monitoring?", options: ["By autonomously terminating underperforming team members", "By rewriting the entire project schedule without human input", "By generating test completion reports that highlight successes and lessons learned to refine future strategies", "By forcing the LLM to learn the organization's entire codebase overnight"], answer: 2, explanation: "GenAI assists test monitoring by processing raw metrics into actionable summaries, such as quickly generating test completion reports that highlight successes, analyze trends, and identify lessons learned to continually refine future testing strategies.", syllabusMapping: "GenAI-2.2.4 (K3) Apply generative AI to test control and monitoring tasks" },
{ question: "When evaluating AI-generated test outputs, what does the 'Diversity' metric specifically measure?", options: ["The percentage of test scripts that compile without syntax errors", "The time saved compared to manual test creation", "The degree to which the generated test cases cover various user behaviors and explore edge cases", "The exact match between the AI's output and a predefined expert-written test case"], answer: 2, explanation: "The diversity metric specifically evaluates whether the AI has generated a sufficiently varied set of outputs—such as test cases that cover many different user behaviors, combinations of inputs, and obscure edge cases—rather than producing narrow, repetitive scenarios.", syllabusMapping: "GenAI-2.3.1 (K2) Understand the metrics for evaluating the results of Generative AI on test tasks" },
{ question: "A tester creates two completely different prompt structures for generating boundary value tests and runs both to see which yields better accuracy. What technique is the tester applying?", options: ["Iterative prompt modification", "Output analysis", "Meta prompting", "A/B testing of prompts"], answer: 3, explanation: "A/B testing of prompts involves creating multiple, distinct versions of prompts (Prompt A and Prompt B) and actively evaluating which version produces better results based on predefined metrics to determine the most effective structure.", syllabusMapping: "GenAI-2.3.2 (K2) Give examples of techniques for evaluating and iteratively refining prompts" },
{ question: "Which structured prompt component specifies that the LLM must 'act as a senior test automation engineer'?", options: ["Role", "Instruction", "Context", "Constraints"], answer: 0, explanation: "The 'Role' component explicitly defines the perspective or persona that the GenAI model should adopt when generating its response, such as acting as a tester, a test manager, or a senior test automation engineer.", syllabusMapping: "GenAI-2.1.1 (K2) Give examples of the structure of prompts used in generative AI for software testing" },
{ question: "A tester provides an LLM with three specific examples of user stories paired with their corresponding defect reports, and then asks the LLM to generate a defect report for a new user story. What technique is this?", options: ["Zero-shot prompting", "Few-shot prompting", "Prompt chaining", "Meta prompting"], answer: 1, explanation: "Few-shot prompting involves providing the LLM with examples in the prompt, and using more than one example helps further consolidate the desired response behavior.", syllabusMapping: "GenAI-2.1.2 (K2) Differentiate core prompting techniques for software testing" },
{ question: "Why is the 'Execution Success Rate' an important metric for evaluating AI-generated test scripts?", options: ["It measures the amount of computational energy the LLM consumed", "It ensures the LLM's outputs use advanced vocabulary", "It measures the proportion of generated test scripts that can be executed successfully without syntax or format errors", "It compares the test script execution time to manual testing time"], answer: 2, explanation: "Execution Success Rate measures the proportion of generated test cases or test scripts that can be executed successfully, determining how many can be executed without syntax errors or output format issues.", syllabusMapping: "GenAI-2.3.1 (K2) Understand the metrics for evaluating the results of Generative AI on test tasks" },
{ question: "Why are LLMs particularly prone to reasoning errors when performing tasks like mathematical calculations or complex test prioritization?", options: ["Because they lack true logical reasoning and instead rely on pattern matching", "Because their context windows are too small to hold numbers", "Because data poisoning inherently forces them to miscalculate", "Because their training data is strictly limited to source code, excluding mathematics"], answer: 0, explanation: "Unlike humans, LLMs lack true logical reasoning and rely on pattern matching, which can lead to faulty logic when performing tasks such as mathematical reasoning.", syllabusMapping: "GenAI-3.1.1 (K1) Recall the definitions of hallucinations, reasoning errors and biases in Generative AI systems" },
{ question: "A tester generates a synthetic dataset for a global application but notices that the AI only outputs user names typical of North America. What type of defect does this represent?", options: ["Hallucination", "Bias", "Reasoning error", "Context window overflow"], answer: 1, explanation: "LLM biases come from the data on which the model was trained, leading to outputs that favor certain types of information or perspectives, such as underrepresenting non-English perspectives.", syllabusMapping: "GenAI-3.1.2 (K3) Identify hallucinations, reasoning errors and biases in LLM output" },
{ question: "Which hallucination detection approach involves ensuring that the AI-generated outputs do not contradict each other within the same session?", options: ["Domain expertise consultation", "Cross-verification against documentation", "Consistency checks", "Logical validation"], answer: 2, explanation: "Consistency checks verify that generated outputs are consistent with each other and with known information.", syllabusMapping: "GenAI-3.1.3 (K2) Summarize mitigation techniques for GenAI hallucinations, reasoning errors and biases" },
{ question: "What is the effect of lowering the temperature parameter during LLM inference?", options: ["It increases the speed of the output generation by 50%", "It broadens the probability distribution, leading to highly creative outputs", "It narrows the probability distribution, reducing randomness and leading to more consistent outputs", "It guarantees complete immunity against data exfiltration attacks"], answer: 2, explanation: "Lowering the temperature during response generation narrows the probability distribution, reducing randomness and resulting in more consistent outputs.", syllabusMapping: "GenAI-3.1.4 (K1) Recall mitigation techniques for non-deterministic behavior of LLMs" },
{ question: "A tester masks sensitive customer ID numbers with non-identifiable, synthetic IDs before including the data in a prompt. Which privacy mitigation strategy is being applied?", options: ["Data pseudonymization", "Secure data transmission", "Data minimization", "Output testing"], answer: 0, explanation: "Data anonymization and pseudonymization involve masking or replacing sensitive information with non-identifiable data.", syllabusMapping: "GenAI-3.2.3 (K2) Give examples of mitigation strategies for data privacy, security, and intellectual property risks" },
{ question: "How does 'Data Minimization' protect privacy when testing with Generative AI?", options: ["It forces the LLM to output shorter, more concise test cases", "It involves avoiding the processing of sensitive data unless legally permitted and using only the necessary amount of non-sensitive data", "It shrinks the size of the vector database to save cloud storage costs", "It relies strictly on open-source LLMs instead of commercial models"], answer: 1, explanation: "Data minimization involves avoiding the processing of sensitive data unless legally permitted and using only the necessary amount of non-sensitive data in AI testing to reduce data privacy risks.", syllabusMapping: "GenAI-3.2.3 (K2) Give examples of mitigation strategies for data privacy, security, and intellectual property risks" },
{ question: "According to the syllabus, how does the energy consumption of image generation compare to text generation?", options: ["Generating a single image consumes about the same energy as generating a paragraph of text", "Generating a paragraph of text requires ten times the energy of an image", "Generating a single image can consume as much energy as fully charging a smartphone, while text consumes only a small percentage of a charge", "Both tasks consume identical amounts of energy because they run on the same transformer architecture"], answer: 2, explanation: "Generating a single image using a powerful AI model can consume as much energy as fully charging a smartphone, while generating text consumes only a small percentage of a smartphone's charge.", syllabusMapping: "GenAI-3.3.1 (K2) Understand the environmental impact of using Generative AI for software testing" },
{ question: "What risk is primarily associated with 'Unintentional Data Exposure' in GenAI testing?", options: ["The model generates fake data that looks realistic", "The model generates outputs that accidentally reveal sensitive or personally identifiable information it was exposed to", "The model crashes and deletes the organization's database", "The model refuses to answer prompts due to safety filters"], answer: 1, explanation: "Unintentional data exposure occurs when GenAI models generate outputs that accidentally reveal sensitive information.", syllabusMapping: "GenAI-3.2.1 (K2) Explain key data privacy and security risks associated with using Generative AI in software testing" },
{ question: "Which form of attack involves an attacker maliciously crafting deceptive prompts to induce an LLM to produce vulnerable test scripts with hidden security flaws?", options: ["Data poisoning", "Data exfiltration", "Request manipulation", "Malicious code generation"], answer: 3, explanation: "Malicious code generation involves manipulating an LLM to generate backdoors (e.g., external command calls) during use.", syllabusMapping: "GenAI-3.2.2 (K2) Give examples of vulnerabilities and security threats associated with LLMs" },
{ question: "In a Retrieval-Augmented Generation (RAG) system, what is the role of a vector database?", options: ["It stores SQL queries for legacy database interactions", "It hosts the graphical user interface for the testing team", "It stores high-dimensional embeddings of data chunks to enable efficient similarity-based retrieval at runtime", "It executes the automated test scripts generated by the LLM"], answer: 2, explanation: "Embeddings are stored in vector databases to enable efficient similarity-based retrieval at runtime during the RAG process.", syllabusMapping: "GenAI-4.1.1 (K2) Explain key architectural components and concepts of LLM-powered test infrastructure" },
{ question: "Why are large requirements documents typically broken into smaller chunks (e.g., 256-512 tokens) during the preprocessing phase of RAG?", options: ["To ensure focused retrieval and compatibility with the LLM's context window", "To permanently delete outdated requirements from the system", "To translate the text into machine code", "To increase the hallucination rate of the model"], answer: 0, explanation: "During preprocessing, large documents are broken into smaller chunks (e.g., 256-512 tokens) to ensure focused retrieval and compatibility with the model context window.", syllabusMapping: "GenAI-4.1.2 (K2) Summarize Retrieval-Augmented Generation" },
{ question: "Which type of LLM-powered agent operates independently using predefined rules, reinforcement learning, and adaptive feedback loops?", options: ["A semi-autonomous agent", "An orchestrated chatbot", "An autonomous agent", "A symbolic reasoning agent"], answer: 2, explanation: "Autonomous agents operate independently, performing tasks with minimal human intervention using predefined rules, reinforcement learning, and adaptive feedback loops.", syllabusMapping: "GenAI-4.1.3 (K2) Explain the role and application of LLM-powered agents in automating test processes" },
{ question: "What does 'opacity' refer to as a challenge when fine-tuning a GenAI model?", options: ["The inability of the model to read dark or low-contrast images", "The lack of transparency in how an LLM makes its decisions, complicating debugging and validation", "The strict data privacy laws preventing access to production data", "The model becoming too specialized to the training data"], answer: 1, explanation: "Opacity refers to the lack of transparency in how an LLM makes its decisions or produces its outputs, which complicates debugging and validation.", syllabusMapping: "GenAI-4.2.1 (K2) Explain the fine-tuning of language models for specific test tasks" },
{ question: "What is a primary advantage of fine-tuning a Small Language Model (SLM) for software testing instead of a Large Language Model (LLM)?", options: ["It requires zero computational resources to train", "It achieves higher performance levels for specific tasks without the massive computational overhead required for LLMs", "It guarantees that the model will never suffer from hallucinations", "It can process unlimited context windows unlike LLMs"], answer: 1, explanation: "By fine-tuning an SLM, one can achieve higher performance levels for specific tasks without the same computational overhead required for LLMs.", syllabusMapping: "GenAI-5.1.3 (K2) Summarize key criteria for selecting LLMs/SLMs for software test tasks in a given context" },
{ question: "What is the role of the post-processing component in the back-end of an LLM-powered test infrastructure?", options: ["It manages user authentication", "It breaks user stories into embeddings", "It enhances the LLM’s raw output, ensuring its responses align with the test conditions before presenting them to the front-end", "It writes the raw prompt directly to the database without LLM interaction"], answer: 2, explanation: "The back end enhances the LLM’s raw output through post-processing, ensuring its responses align with the test conditions of the test process before presenting them to the front-end.", syllabusMapping: "GenAI-4.1.1 (K2) Explain key architectural components and concepts of LLM-powered test infrastructure" },
{ question: "In the context of LLM-powered agents, what does the term 'tools' refer to?", options: ["Physical hardware servers hosting the LLM", "A predefined set of functions or APIs that the agent can invoke to interact with and manipulate external systems", "The visual interface of the chatbot", "The natural language parameters configured in the system prompt"], answer: 1, explanation: "LLM-powered agents can perform tasks or 'act' by invoking a predefined set of functions, commonly referred to as 'tools'.", syllabusMapping: "GenAI-4.1.3 (K2) Explain the role and application of LLM-powered agents in automating test processes" },
{ question: "Which of the following is a risk directly associated with the use of Shadow AI in a test organization?", options: ["Decreased intellectual property risks", "Complete elimination of software defects", "Unclear licensing agreements potentially exposing the organization to intellectual property disputes", "Enforced compliance with GDPR data handling policies"], answer: 2, explanation: "The use of AI tools with unclear licensing agreements can expose LLM users to intellectual property disputes, especially if copyrighted data is processed without proper authorization, which is a risk of shadow AI.", syllabusMapping: "GenAI-5.1.1 (K1) Recall the risks of shadow AI" },
{ question: "During which phase of GenAI adoption does an organization focus heavily on continuous monitoring, measurement, and managing the transformation to ensure sustainable benefits?", options: ["Discovery", "Initiation and usage definition", "Experimentation and alignment", "Utilization and iteration"], answer: 3, explanation: "In the Utilization and iteration phase, continuous monitoring of the progress of GenAI for software testing and related tools is in place, as well as measurement and management of the transformation to ensure sustainable benefits.", syllabusMapping: "GenAI-5.1.4 (K1) Recall key phases in the adoption of Generative AI in a test organization" },
{ question: "How does the adoption of GenAI transform the responsibilities of test managers?", options: ["Test managers no longer need to manage test strategies and focus solely on coding Python scripts", "Test managers focus on establishing AI governance frameworks, AI-based risk management, and overseeing hybrid teams of people and GenAI tools", "Test managers delegate all test monitoring tasks to the front-end LLM interface", "Test managers shift exclusively to analyzing the mathematical weights of deep learning neural networks"], answer: 1, explanation: "Test managers must update their skills to balance human and AI capabilities, strategically coordinating and overseeing hybrid teams composed of human testers and GenAI-powered autonomous test agents.", syllabusMapping: "GenAI-5.2.3 (K1) Recognize how test processes and responsibilities shift within a test organization when adopting Generative AI for testing" },
{ question: "What is the purpose of creating a 'prompt pattern' within an internal community of practice?", options: ["To bypass organizational firewalls securely", "To create a reusable template for crafting effective prompts to guide GenAI toward consistent and reliable outputs", "To automatically encrypt all test data sent to the cloud", "To eliminate the need to ever write instructions again"], answer: 1, explanation: "A prompt pattern is a reusable template or structural blueprint for crafting effective prompts, helping guide the GenAI toward generating consistent and reliable test outputs across the team.", syllabusMapping: "GenAI-5.2.2 (K1) Recall strategies for cultivating AI skills within test teams to support the adoption of Generative AI in test activities" },
{ question: "Which environmental consideration is highlighted as an essential skill for testers working with Generative AI?", options: ["Forcing the AI to only run during night hours", "Optimizing model selection and usage patterns to reduce computational overhead", "Using paper-based test reporting instead of digital dashboards", "Exclusively using foundation LLMs for all tasks to save energy"], answer: 1, explanation: "Testers must understand the environmental impact of GenAI, requiring them to optimize model selection and usage patterns (such as choosing a Small Language Model over a massive LLM for simpler tasks) to consciously reduce computational overhead and energy consumption.", syllabusMapping: "GenAI-5.2.1 (K2) Explain the essential skills and knowledge areas required for testers to work effectively with generative AI in test processes" },
{ question: "What is the primary focus of the 'Initiation and usage definition' phase of GenAI adoption?", options: ["Experimenting with initial use cases to build confidence", "Identifying and prioritizing practical use cases for GenAI in software testing, and ensuring alignment with organizational needs", "Continuous monitoring of test progress in production", "Writing the source code for an in-house foundation model"], answer: 1, explanation: "The Initiation and usage definition phase focuses on identifying and prioritizing practical use cases for GenAI in software testing, developing expertise, and ensuring alignment with the organization's needs.", syllabusMapping: "GenAI-5.1.4 (K1) Recall key phases in the adoption of Generative AI in a test organization" },
{ question: "According to the syllabus, why is 'Data Quality' considered critical when defining a GenAI testing strategy?", options: ["Because high-quality data allows the LLM to skip the tokenization process", "Because poor data automatically triggers a data exfiltration attack", "Because the effectiveness of LLM-powered testing depends on accurate, relevant input data to achieve trustworthy results", "Because high-quality data eliminates the need for any human oversight"], answer: 2, explanation: "Data quality plays a critical role, as the effectiveness of LLM-powered testing depends on accurate, relevant input data. Maintaining high-quality input data is therefore key to achieving results that can be trusted to be correct.", syllabusMapping: "GenAI-5.1.2 (K2) Explain the key aspects to consider when defining a Generative AI strategy for software testing" },
{ question: "You need an LLM that will help with decision-making based on a process similar to human logic. Which type of LLM should you use?", options: ["Foundation LLM", "Instruction-tuned LLM", "Reasoning LLM", "Ad-hoc LLM"], answer: 2, explanation: "You need a reasoning LLM because that training method is specifically designed to emulate human-like reasoning responses and perform multi-step logical inference.", syllabusMapping: "GenAI-1.1.3 (K2) Distinguish between foundation, instruction-tuned and reasoning LLMs" },
{ question: "Which of the following is an advantage of using an LLM augmented with vision-language models for developing test cases?", options: ["There is no advantage because this type of model is used primarily for military applications", "It can create test cases that can include text and visual cues", "It can edit images much faster and more accurately than a human", "It can generate executable code from wireframes and screenshots"], answer: 1, explanation: "Vision-language models can process visual data, meaning they can create test cases that seamlessly include both textual data and visual cues, which significantly increases overall test coverage.", syllabusMapping: "GenAI-1.1.4 (K2) Summarize the basic principles of multimodal LLMs and vision-language models" },
{ question: "You have created test automation that will be used to test driver's license applications. There is a huge amount of data available for this testing, but it will take too long to test with all of that data. How can an LLM help with this problem?", options: ["It can create new synthetic data that will protect private information", "It can take the existing data and augment that with data that is missing according to the data rules", "It can take the existing data and break it into smaller sets that will contain representative and interesting variances", "It can delete data that is duplicated and replace it with new data"], answer: 2, explanation: "It can look at the massive existing data pool, analyze it, and intelligently break it into smaller sets that still contain representative and interesting data variances to optimize test execution time.", syllabusMapping: "GenAI-1.2.1 (K2) Give examples of key LLM capabilities for test tasks" },
{ question: "Your organization is developing a test management tool that will use AI to generate, classify, and store test cases based on requirements, general testing knowledge, and previous issues found. Which of the following interaction models would be best to use?", options: ["Chatbots talking to the LLM", "Chatbots talking to other chatbots that have been trained on your system", "APIs of the LLM to allow the test task information to pass into and out of the LLM", "APIs of the LLM to pass the test case information into the LLM to be stored there"], answer: 2, explanation: "Using the APIs of the LLM allows maximum programmatic usage by seamlessly and dynamically passing necessary data to and from it. The test case information is securely stored in the test management system itself, not inside the LLM.", syllabusMapping: "GenAI-1.2.2 (K2) Compare interaction models when using GenAI for software testing" },
{ question: "Which of the following is a primary reason an organization might choose a Small Language Model (SLM) over a Large Language Model (LLM) for a specific software testing task?", options: ["SLMs completely eliminate the risk of hallucinations and reasoning errors", "SLMs offer a balance between efficiency and task-specific language understanding without massive computational overhead", "SLMs rely strictly on rule-based symbolic AI processing", "SLMs have a larger context window than most Foundation LLMs"], answer: 1, explanation: "Small Language Models (SLMs) are designed to provide lightweight, highly focused GenAI solutions that balance efficiency with task-specific understanding, requiring far less computational overhead than massive LLMs.", syllabusMapping: "GenAI-1.1.2 (K2) Explain the basics of generative AI and large language models" },
{ question: "During the inference phase, how does a transformer-based LLM generate text for a software testing response?", options: ["It retrieves exact sentences from its database using SQL queries", "It applies strict grammatical rules to a symbolic syntax tree", "It predicts the next token in a sequence by leveraging learned relationships and statistical probabilities", "It searches the live internet and copies the most relevant paragraphs"], answer: 2, explanation: "The transformer model architecture generates new text by predicting the next token in a sequence based on learned relationships and statistical probabilities from its training data.", syllabusMapping: "GenAI-1.1.2 (K2) Explain the basics of generative AI and large language models" },
{ question: "Why are instruction-tuned LLMs particularly well-suited for generating test cases that must adhere strictly to a specific organizational template?", options: ["They are the only models that can process images of the templates", "They are specifically fine-tuned using datasets that pair prompts with expected responses optimizing for task adherence and formatting", "They possess true human-like cognitive reasoning that prevents formatting errors", "They do not utilize tokenization allowing for perfect syntax matching"], answer: 1, explanation: "Instruction-tuned LLMs are derived from foundation models and fine-tuned on prompt-response pairs. They are optimized for task adherence, instruction following, and response coherence, making them ideal for strict template formatting.", syllabusMapping: "GenAI-1.1.3 (K2) Distinguish between foundation, instruction-tuned and reasoning LLMs" },
{ question: "You are working on a replacement of an e-commerce system. You have been given a large set of test conditions to test. There is not adequate time to test all the conditions. You have a testing-trained LLM that you can use. How can you best use it in this situation?", options: ["The LLM can create an estimate for how long testing will take based on similar test conditions to push the schedule back", "The LLM can be fed information regarding previous defects and requirements to let it determine the relative risk and prioritize the testing", "The LLM can generate and execute all the test cases based on the test conditions to save significant time", "The LLM can generate test data to cover every possible purchasing scenario to eliminate testing escapes"], answer: 1, explanation: "Since there isn't enough time, the tests will have to be prioritized and executed in priority order. The LLM can prioritize test conditions based on risk level when provided with proper context like historical defects.", syllabusMapping: "GenAI-2.2.1 (K3) Apply generative AI to test analysis tasks" },
{ question: "You have been given requirements in the form of wireframes of the GUI and user stories. You want to use these to create the test conditions for a set of tests. How should you use prompts to evaluate the inputs and create the test conditions?", options: ["Apply multimodal prompts", "Set well-defined system parameters to define the graphics to be used", "Apply prompt chaining alone without attachments", "Use meta prompting so the prompts can be continuously refined"], answer: 0, explanation: "In this case, you will definitely need multimodal prompts because the data you are providing is a combination of both visual graphics (wireframes) and text (user stories).", syllabusMapping: "GenAI-2.2.2 (K3) Apply generative AI to test design and test implementation tasks" },
{ question: "You have been testing versions of the same software over several years. Rather than the quality improving, it seems to just stay the same, with the same high number of defects being caught during testing for each release. How could AI help with this problem?", options: ["It could prioritize the tests that failed last time so they are executed first", "It could use meta prompting to review each test case to determine if it is effective", "It could create large sets of test data to ensure data variance is not causing the failures", "It could conduct root cause analysis over all the defects found across releases to determine the common causes"], answer: 3, explanation: "We don't know what's causing these repeating issues that keep slipping into the testing phase. Using AI to conduct a root cause analysis will analyze the historical data to tell us exactly what is breaking and why.", syllabusMapping: "GenAI-2.2.3 (K3) Apply generative AI to automated regression testing" },
{ question: "You are working on a critical project under the scrutiny of senior management. Simple and clear reporting of testing progress is paramount. You use a test management system, but analyzing the issues and trends is done manually. How could AI help?", options: ["AI could verify that the prioritization is correct based on keywords in the defect report", "AI could track which test cases are finding the most defects to highlight on reports", "AI could analyze the defect and test case execution information to provide trending information and root cause analysis mapped to the use cases", "AI could automatically email the existing dashboards to the pertinent executives"], answer: 2, explanation: "AI can analyze large amounts of information to extract necessary trending and root cause analysis. By mapping the findings directly to the use cases, the importance and impact of the failures become much easier to assess for stakeholders.", syllabusMapping: "GenAI-2.2.4 (K3) Apply generative AI to test control and monitoring tasks" },
{ question: "You are working on testing a new system. The requirements are high-level and lack detail. What prompting technique should you use to get started to get some ideas for how to progress with test case generation?", options: ["Prompt chaining", "Few-shot prompting", "Meta prompting", "Zero-shot prompting"], answer: 2, explanation: "Meta prompting is a good starting point here. You have a general description, so the AI can generate or refine its own prompts interactively to help you figure out how to best proceed.", syllabusMapping: "GenAI-2.2.5 (K3) Select and apply appropriate prompting techniques for a given context and test task" },
{ question: "You are using GenAI to create test cases for a heavily rules-based application. You requested that it use decision tables to build the test cases. Which metric would be the BEST one to use to determine how well it has done with this request?", options: ["Accuracy", "Recall", "Diversity", "Time Efficiency"], answer: 1, explanation: "The recall metric evaluates the completeness of the generated output with respect to a specific objective—in this case, ensuring it identified and included all the valid rules and equivalence partitions of the decision table.", syllabusMapping: "GenAI-2.3.1 (K2) Understand the metrics for evaluating the results of Generative AI on test tasks" },
{ question: "You have been iteratively modifying your prompt for GenAI test case creation. You are still getting the same types of issues with the output, even though you keep refining the prompts and adding more information. What technique can you employ to use those issues to better evaluate and refine the prompts?", options: ["Iterative prompt modification", "A/B testing of prompts", "Output analysis", "Adjusting prompt specificity"], answer: 2, explanation: "At this point, you need to perform Output Analysis on the specific errors. Analyzing the outputs helps determine exactly why you are seeing these issues occur repeatedly before you make any further random prompt modifications.", syllabusMapping: "GenAI-2.3.2 (K2) Give examples of techniques for evaluating and iteratively refining prompts" },
{ question: "In the context of automated regression testing, how does Generative AI enable 'self-healing' test scripts?", options: ["By automatically deleting broken test scripts from the repository", "By automatically rewriting the entire application source code to match the test script", "By automatically executing the tests in an infinite loop until they pass", "By automatically adjusting test scripts to handle minor UI or API changes preventing unnecessary failures"], answer: 3, explanation: "GenAI can dynamically adapt to codebase changes, intelligently adjusting the automated test scripts to handle minor UI or API changes. This 'self-healing' capability prevents unnecessary failures caused by small, trivial modifications.", syllabusMapping: "GenAI-2.2.3 (K3) Apply generative AI to automated regression testing" },
{ question: "When maintaining automated regression tests, how does GenAI specifically assist with API tests compared to GUI tests?", options: ["It ignores API tests because it only processes visual wireframes", "It strictly adjusts dynamic locators for APIs", "It adapts test scripts to evolving API specifications such as changing endpoints and request/response formats", "It converts API tests into manual exploratory testing charters"], answer: 2, explanation: "While GUI tests face challenges with dynamic locators, API tests face challenges with changing request/response formats, endpoints, and authentication. GenAI can adapt scripts to these evolving API specifications, preventing unnecessary failures.", syllabusMapping: "GenAI-2.2.3 (K3) Apply generative AI to automated regression testing" },
{ question: "You are reviewing AI-generated test cases to ensure they integrate the unique domain-specific requirements of your healthcare application. Which evaluation metric are you primarily measuring?", options: ["Precision", "Diversity", "Execution Success Rate", "Relevance and Contextual Fit"], answer: 3, explanation: "The relevance and contextual fit metric ensures that the generated test cases align with specific software requirements, domain constraints, and the business logic of the application under test.", syllabusMapping: "GenAI-2.3.1 (K2) Understand the metrics for evaluating the results of Generative AI on test tasks" },
{ question: "A tester provides an LLM with a user story and a set of manually written test conditions. The tester prompts the LLM to identify if any functional aspects of the user story have been missed by the current test conditions. What test analysis task is the LLM supporting?", options: ["Test data synthesis", "Automated test script generation", "Coverage analysis", "Root cause analysis"], answer: 2, explanation: "By asking the LLM to identify if any functional aspects of the user story have been missed by the current conditions, the tester is leveraging the AI to perform coverage analysis and gap identification to ensure all aspects are addressed.", syllabusMapping: "GenAI-2.2.1 (K3) Apply generative AI to test analysis tasks" },
{ question: "You are using GenAI to develop a test plan. You have fed it the requirements, schedules, and tester profiles. When you ask it to generate the test schedule, it creates a new team member and puts them on the schedule to make the testing effort fit the project timeline. What is the problem?", options: ["This is a bias problem", "This is a hallucination", "This is a reasoning error", "This is a temperature problem"], answer: 1, explanation: "This is a hallucination where the AI model has invented a completely fictitious team member that does not exist in the context data in order to make the schedule work.", syllabusMapping: "GenAI-3.1.2 (K3) Identify hallucinations, reasoning errors and biases in LLM output" },
{ question: "If you have a GenAI tool that is processing sensitive customer data, what must you ensure?", options: ["It cannot store the data in an unencrypted form because it will be readable by anyone", "It cannot store the data where it might be accessed by an unauthorized user including another GenAI tool", "It cannot modify and then restore the data because it will be incorrect", "It cannot access any sensitive data for any use"], answer: 1, explanation: "The primary risk is that the GenAI tool might store the sensitive data somewhere that could be exposed to or accessed by unauthorized users, including other AI training pipelines.", syllabusMapping: "GenAI-3.2.1 (K2) Explain key data privacy and security risks associated with using Generative AI in software testing" },
{ question: "You process employee leave requests. You replaced all birth dates in your data with a default date of 1/1/89. You use GenAI within your company's databases to build new test data. You discover the test data contains real birthdates again. What type of data privacy issue is this?", options: ["Lack of control over data usage", "Vulnerability to security attacks", "Evidence of a malicious introduction of false data", "Unintentional data exposure"], answer: 3, explanation: "This is an unintentional exposure of private data. The AI likely pulled the real dates from somewhere else in its context or underlying training data and exposed them in its output.", syllabusMapping: "GenAI-3.2.1 (K2) Explain key data privacy and security risks associated with using Generative AI in software testing" },
{ question: "What type of attack vector is being used when the results of AI-generated data are rated incorrectly intentionally to manipulate the model's future behavior?", options: ["Data exfiltration", "Request manipulation", "Data poisoning", "Malicious code generation"], answer: 2, explanation: "Data poisoning involves manipulating the training or fine-tuning data, such as intentionally providing fake evaluations or rating data incorrectly, to compromise the model's accuracy and behavior.", syllabusMapping: "GenAI-3.2.2 (K2) Give examples of vulnerabilities and security threats associated with LLMs" },
{ question: "What is the purpose of data anonymization in the context of GenAI testing?", options: ["To use only the smallest amount of data needed", "To mask or replace any private information with non-identifiable data", "To implement strong encryption and strictly control data access", "To ensure everyone is trained in the proper handling of data"], answer: 1, explanation: "Data anonymization specifically involves masking or replacing private information with non-identifiable or synthetic data to mitigate privacy risks before sending that data to the LLM.", syllabusMapping: "GenAI-3.2.3 (K2) Give examples of mitigation strategies for data privacy, security, and intellectual property risks" },
{ question: "Which of the following GenAI activities takes about as much power as fully charging a smartphone?", options: ["Generating a letter to your bank", "Creating a business presentation outline", "Creating only one image of a penguin", "Generating a financial year summary report"], answer: 2, explanation: "Image generation requires significantly more computational resources than text generation. Generating a single image using a powerful AI model can consume as much energy as fully charging a smartphone.", syllabusMapping: "GenAI-3.3.1 (K2) Understand the environmental impact of using Generative AI for software testing" },
{ question: "Which of the following establishes a legal framework addressing AI risks and classifying applications by risk level?", options: ["ISO/IEC 42001:2023", "ISO/IEC 23053:2022", "EU AI Act", "NIST AI Risk Management Framework"], answer: 2, explanation: "The EU AI Act is a regulatory legal framework that specifically addresses AI risks by classifying applications according to their potential risk level and mandating safety practices.", syllabusMapping: "GenAI-3.4.1 (K1) Recall examples of AI regulations, standards, and best practice frameworks relevant to Generative AI in software testing" },
{ question: "A tester uploads a screenshot to a multimodal LLM to generate UI test cases. Unknown to the tester, the image contains hidden text designed to lure the AI into a different context, provoking hallucinations. What specific type of attack vector is this?", options: ["Data exfiltration", "Request manipulation", "Data poisoning", "Malicious code generation"], answer: 1, explanation: "Request manipulation involves introducing data (like deceptive hidden text embedded in an image) that disrupts the AI's output during runtime use, effectively hijacking its intended behavior.", syllabusMapping: "GenAI-3.2.2 (K2) Give examples of vulnerabilities and security threats associated with LLMs" },
{ question: "An attacker intentionally submits an extremely long prompt to an LLM, attempting to overload the context window memory. As a result, the LLM outputs random snippets of its original training data, revealing confidential API keys. What type of attack is this?", options: ["Data poisoning", "Data exfiltration", "Model fine-tuning", "Symbolic AI hijacking"], answer: 1, explanation: "Data exfiltration involves sending requests (such as intentionally overloading the context window) specifically designed to extract confidential training data or sensitive information from the model's memory.", syllabusMapping: "GenAI-3.2.2 (K2) Give examples of vulnerabilities and security threats associated with LLMs" },
{ question: "Which data privacy mitigation strategy strictly involves avoiding the processing of sensitive data unless legally permitted, and using only the smallest necessary amount of non-sensitive data?", options: ["Data pseudonymization", "Data minimization", "Secure data storage", "Zero-shot prompting"], answer: 1, explanation: "Data minimization is the core privacy principle that mandates using only the absolute necessary amount of data and avoiding the processing of sensitive data unless legally permitted.", syllabusMapping: "GenAI-3.2.3 (K2) Give examples of mitigation strategies for data privacy, security, and intellectual property risks" },
{ question: "After using an LLM to generate an automated API test script, the tester immediately executes the script against the staging environment to verify if it accurately interacts with the endpoints. What type of reasoning error detection is this?", options: ["Domain expertise consultation", "Output testing", "Cross-verification", "Prompt chaining"], answer: 1, explanation: "Output testing involves directly running the generated test cases or test scripts against the test objects (e.g., the staging environment) to verify the test results and effectively catch logical or reasoning errors.", syllabusMapping: "GenAI-3.1.3 (K2) Summarize mitigation techniques for GenAI hallucinations, reasoning errors and biases" },
{ question: "During the preprocessing phase of Retrieval-Augmented Generation (RAG), why are large requirements documents typically broken down into smaller chunks of 256-512 tokens?", options: ["To ensure focused semantic retrieval and compatibility with the LLM's context window limit", "To permanently delete older requirements from the vector database", "To increase the temperature setting of the language model automatically", "To encrypt the text before it is sent to the relational database"], answer: 0, explanation: "Large documents are chunked during preprocessing to ensure highly focused semantic retrieval and to guarantee that the retrieved information physically fits within the strict limits of the model's context window.", syllabusMapping: "GenAI-4.1.2 (K2) Summarize Retrieval-Augmented Generation" },
{ question: "An organization decides to develop an in-house LLM-powered testing tool rather than using a public AI chatbot. According to LLMOps practices, what is the PRIMARY advantage of this in-house approach?", options: ["It eliminates the need to train staff on prompt engineering", "It completely removes operational costs such as computational resources and data storage", "It guarantees zero hallucinations during test execution", "It offers comprehensive control over data privacy and security risks"], answer: 3, explanation: "Developing an in-house LLM-powered test tool offers the organization comprehensive, full-stack control over data privacy and security risks, ensuring no sensitive data leaves the internal network.", syllabusMapping: "GenAI-4.2.2 (K2) Explain LLMOps and its role in deploying and managing LLMs for test tasks" },
{ question: "What is the key operational difference between an autonomous LLM-powered agent and a semi-autonomous LLM-powered agent in a test process?", options: ["Autonomous agents only handle text while semi-autonomous agents handle images", "Autonomous agents operate independently using adaptive feedback loops while semi-autonomous agents require periodic human oversight", "Autonomous agents are always deployed in-house while semi-autonomous agents are cloud-based", "Autonomous agents do not use LLMs"], answer: 1, explanation: "Autonomous agents increase efficiency by operating independently with adaptive feedback loops and minimal intervention, while semi-autonomous agents involve strategic human oversight to ensure quality.", syllabusMapping: "GenAI-4.1.3 (K2) Explain the role and application of LLM-powered agents in automating test processes" },

let currentQuestionIndex = 0; let score = 0;
const questionEl = document.getElementById("question"), optionsEl = document.getElementById("options"), explanationEl = document.getElementById("explanation"), nextBtn = document.getElementById("next-btn"), progressEl = document.getElementById("progress"), questionContainer = document.getElementById("question-container"), resultsContainer = document.getElementById("results"), scoreEl = document.getElementById("score");

function loadQuestion() {
    explanationEl.style.display = "none"; nextBtn.style.display = "none"; optionsEl.innerHTML = "";
    const currentData = quizData[currentQuestionIndex];
    questionEl.innerText = currentData.question;
    progressEl.innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;
    currentData.options.forEach((option, index) => {
        const button = document.createElement("button");
        button.innerText = option; button.classList.add("option-btn");
        button.onclick = () => selectAnswer(index, button);
        optionsEl.appendChild(button);
    });
}

function selectAnswer(selectedIndex, selectedButton) {
    const currentData = quizData[currentQuestionIndex];
    const allButtons = optionsEl.querySelectorAll(".option-btn");
    allButtons.forEach(btn => btn.disabled = true);
    if (selectedIndex === currentData.answer) { selectedButton.classList.add("correct"); score++; } 
    else { selectedButton.classList.add("wrong"); allButtons[currentData.answer].classList.add("correct"); }
    explanationEl.innerHTML = `<strong>Explanation:</strong> ${currentData.explanation}<span class="syllabus-mapping"><strong>Syllabus Mapping:</strong> ${currentData.syllabusMapping}</span>`;
    explanationEl.style.display = "block"; nextBtn.style.display = "block";
    if (currentQuestionIndex === quizData.length - 1) nextBtn.innerText = "Show Results";
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData.length) loadQuestion(); else showResults();
}

function showResults() {
    questionContainer.style.display = "none"; resultsContainer.style.display = "block";
    const percentage = Math.round((score / quizData.length) * 100);
    scoreEl.innerText = `You scored ${score} out of ${quizData.length} (${percentage}%)`;
}

function restartQuiz() {
    currentQuestionIndex = 0; score = 0; questionContainer.style.display = "block"; resultsContainer.style.display = "none"; nextBtn.innerText = "Next Question"; loadQuestion();
}

loadQuestion();
</script>
