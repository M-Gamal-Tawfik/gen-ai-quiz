<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative AI Testing Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .quiz-container {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
        }
        .option-btn:hover {
            background-color: #e2e6ea;
            border-color: #dae0e5;
        }
        .option-btn.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .option-btn.wrong {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .explanation {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 4px solid #17a2b8;
            border-radius: 4px;
            display: none;
            line-height: 1.5;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            align-items: center;
        }
        .next-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            display: none;
        }
        .next-btn:hover {
            background-color: #0056b3;
        }
        .progress {
            color: #6c757d;
            font-weight: bold;
        }
        .results-container {
            text-align: center;
            display: none;
        }
        .score {
            font-size: 2rem;
            font-weight: bold;
            color: #28a745;
            margin: 20px 0;
        }
        .restart-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quiz-container" id="quiz">
    <h1>Generative AI Testing Quiz</h1>
    
    <div id="question-container">
        <div class="progress" id="progress">Question 1 of 5</div>
        <div class="question-text" id="question">Loading question...</div>
        <div class="options-container" id="options"></div>
        <div class="explanation" id="explanation"></div>
        
        <div class="controls">
            <div></div> <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next Question</button>
        </div>
    </div>

    <div class="results-container" id="results">
        <h2>Quiz Completed!</h2>
        <div class="score" id="score">You scored 0 out of 0</div>
        <button class="restart-btn" onclick="restartQuiz()">Restart Quiz</button>
    </div>
</div>

<script>
    // --- QUIZ DATA ---
    // Note: In arrays, counting starts at 0. So Answer 1 is index 0, Answer 2 is index 1, etc.
    const quizData = [
        {
            question: "A test team is evaluating AI tools. One tool automatically learns features from large visual datasets without manual feature selection, while another uses rule-based logic and symbols to mimic human decisions. Which two AI types are being described respectively?",
            options: [
                "Deep Learning and Symbolic AI",
                "Classical Machine Learning and Symbolic AI",
                "Generative AI and Deep Learning",
                "Classical Machine Learning and Generative AI"
            ],
            answer: 0, // Points to the first option
            explanation: "Deep learning uses neural networks to automatically learn features from data without manual feature selection. Symbolic AI represents knowledge using symbols and logical rules to mimic human decision-making."
        },
        {
            question: "During the analysis of a massive 100-page server log, an LLM starts missing critical failure details that were explicitly provided at the very beginning of the log file. What is the MOST likely technical limitation causing this issue?",
            options: [
                "The temperature setting was too low, restricting the model's memory",
                "The tokenization process failed to convert numeric log data into text",
                "The tokens at the beginning fell outside the model's context window boundary",
                "The model experienced a data poisoning attack during the log analysis"
            ],
            answer: 2, // Points to the third option
            explanation: "When text exceeds the context window size, the model cannot simultaneously consider all parts of the document and must effectively 'forget' or discard tokens that fall outside its boundary."
        },
        {
            question: "How do embeddings enable an LLM to understand the relationships between words in a software testing context?",
            options: [
                "By breaking words down into single characters for faster syntax processing",
                "By capturing semantic, syntactic, and contextual relationships as vectors in a high-dimensional space",
                "By applying predefined symbolic rules to English testing grammar",
                "By predicting the next token using a low-temperature seed value"
            ],
            answer: 1, // Points to the second option
            explanation: "Embeddings are numerical representations of tokens that encode their semantic, syntactic, and contextual relationships into a high-dimensional vector space, positioning similar concepts closely together."
        },
        {
            question: "A tester needs an LLM to perform logical inference, multi-step problem-solving, and synthesize data from complex defect reports to determine testing priorities. Which specific type of LLM is MOST appropriate for this task?",
            options: [
                "Reasoning LLM",
                "Instruction-tuned LLM",
                "Foundation LLM",
                "Vision-language model"
            ],
            answer: 0, // Points to the first option
            explanation: "Reasoning LLMs extend instruction-tuned models by emphasizing structured cognitive abilities such as logical inference, multi-step problem-solving, and synthesizing complex information."
        },
        {
            question: "A test automation engineer wants to identify discrepancies between the expected results defined in a text-based user story and the actual visual elements present on a UI screenshot. What type of model is BEST suited for this?",
            options: [
                "Vision-language model",
                "Classical machine learning model",
                "Symbolic AI model",
                "Foundation LLM without multimodal capabilities"
            ],
            answer: 0, // Points to the first option
            explanation: "Vision-language models, a subset of multimodal LLMs, specifically integrate visual and textual information to perform tasks such as analyzing the consistency between textual and visual input."
        }
        // You can easily add the rest of your questions here following the exact same pattern!
    ];

    // --- QUIZ LOGIC ---
    let currentQuestionIndex = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const explanationEl = document.getElementById("explanation");
    const nextBtn = document.getElementById("next-btn");
    const progressEl = document.getElementById("progress");
    const questionContainer = document.getElementById("question-container");
    const resultsContainer = document.getElementById("results");
    const scoreEl = document.getElementById("score");

    function loadQuestion() {
        // Reset UI for the new question
        explanationEl.style.display = "none";
        nextBtn.style.display = "none";
        optionsEl.innerHTML = "";
        
        const currentData = quizData[currentQuestionIndex];
        
        // Set text
        questionEl.innerText = currentData.question;
        progressEl.innerText = `Question ${currentQuestionIndex + 1} of ${quizData.length}`;

        // Create buttons for options
        currentData.options.forEach((option, index) => {
            const button = document.createElement("button");
            button.innerText = option;
            button.classList.add("option-btn");
            button.onclick = () => selectAnswer(index, button);
            optionsEl.appendChild(button);
        });
    }

    function selectAnswer(selectedIndex, selectedButton) {
        const currentData = quizData[currentQuestionIndex];
        const allButtons = optionsEl.querySelectorAll(".option-btn");

        // Disable all buttons so user can't click twice
        allButtons.forEach(btn => btn.disabled = true);

        // Check if correct
        if (selectedIndex === currentData.answer) {
            selectedButton.classList.add("correct");
            score++;
        } else {
            selectedButton.classList.add("wrong");
            // Highlight the correct answer
            allButtons[currentData.answer].classList.add("correct");
        }

        // Show explanation and next button
        explanationEl.innerHTML = `<strong>Explanation:</strong> ${currentData.explanation}`;
        explanationEl.style.display = "block";
        nextBtn.style.display = "block";
        
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerText = "Show Results";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        questionContainer.style.display = "none";
        resultsContainer.style.display = "block";
        
        const percentage = Math.round((score / quizData.length) * 100);
        scoreEl.innerText = `You scored ${score} out of ${quizData.length} (${percentage}%)`;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        score = 0;
        questionContainer.style.display = "block";
        resultsContainer.style.display = "none";
        nextBtn.innerText = "Next Question";
        loadQuestion();
    }

    // Initialize the quiz on page load
    loadQuestion();
</script>

</body>
</html>
